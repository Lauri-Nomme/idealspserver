name: Server tests
on:
  push:
    branches:
      - master
    paths:
      - 'server/**'
  pull_request:
    branches:
      - master
    paths:
      - 'server/**'
jobs:
  test-server:
    name: Test IdeaLS server (Java)
    strategy:
      matrix:
        os: [ ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
      - name: Run tests
        uses: gradle/gradle-build-action@v3
        with:
          arguments: test
          build-root-directory: server
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: test-report-${{ matrix.os }}
          path: "server/build/reports/tests/test/**/*.*"
  test-comprehensive:
    name: Test IdeaLS server (Python comprehensive)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache IntelliJ IDEA
        id: cache-idea
        uses: actions/cache@v4
        with:
          path: idea
          key: idea-IC-2026.1
      - name: Download IntelliJ IDEA
        if: steps.cache-idea.outputs.cache-hit != 'true'
        run: |
          mkdir -p idea
          curl -fsSL -o idea.zip "https://www.jetbrains.com/intellij-repository/releases/com/jetbrains/intellij/idea/ideaIC/2026.1/ideaIC-2026.1.zip"
          unzip -q idea.zip -d idea
      - name: Build plugin
        uses: gradle/gradle-build-action@v3
        with:
          arguments: buildPlugin --no-daemon -q
          build-root-directory: server
      - name: Install plugin into IDE
        run: |
          mkdir -p idea/plugins/idealsp/lib
          unzip -o server/build/distributions/idealsp-*.zip -d /tmp/plugin-dist
          cp /tmp/plugin-dist/idealsp/lib/* idea/plugins/idealsp/lib/
      - name: Start IDE with LSP server
        run: |
          export IDEA_JDK="$(pwd)/idea/jbr"
          export JAVA_TOOL_OPTIONS="-Djava.awt.headless=true"
          ./idea/bin/idea.sh lsp-server tcp 8989 &
          echo $! > /tmp/idealsp_server.pid
          echo "Waiting for LSP server on port 8989..."
          for i in $(seq 1 90); do
            if python3 -c "import socket; s=socket.socket(); s.connect(('127.0.0.1', 8989)); s.close()" 2>/dev/null; then
              echo "LSP server ready after ${i}s"
              break
            fi
            if [ $i -eq 90 ]; then
              echo "ERROR: LSP server not responding after 90s"
              exit 1
            fi
            sleep 1
          done
      - name: Run comprehensive Python test
        env:
          PROJECT_WORKSPACE: ${{ github.workspace }}
        run: python3 scripts/test_lsp_comprehensive.py
      - name: Stop IDE
        if: always()
        run: |
          if [ -f /tmp/idealsp_server.pid ]; then
            kill $(cat /tmp/idealsp_server.pid) 2>/dev/null || true
            rm /tmp/idealsp_server.pid
          fi
          pkill -f "idea.sh lsp-server" || true
